description: Phase 2a boolean augmentation comparison using U-Net + EfficientNet-B3.

defaults:
  batch_size: 8
  epochs: 30
  lr: 0.0001
  seed: 42
  experiment_log_path: results/experiments_inria155_phase2_augmentation.csv

experiments:
  - run_name: unet_effb3_256_noaug_e30
    architecture: unet
    encoder: efficientnet-b3
    augmentation: false

  - run_name: unet_effb3_256_aug_e30
    architecture: unet
    encoder: efficientnet-b3
    augmentation: true
